name: "Profile Readme Widgets"
description: "Collection of widgets for your profile README updated and extended with love"
author: "ItzDabbzz"
inputs:
  github_token:
    description: 'Token for the repo. Can be passed in using $\{{ secrets.GITHUB_TOKEN }}'
    required: true
  username:
    description: "Github profile username"
    required: true
  feed:
    required: false
    description: "FEED.json file path"
  template:
    description: "TEMPLATE.md file path"
    required: true
    default: "./TEMPLATE.md"
  readme:
    description: "README.md output file path"
    required: true
    default: "./README.md"
  wakatime_key:
    description: "WakaTime API Key"
    required: false
runs:
  using: 'node20'
  main: "dist/index.js"
branding:
  icon: "star"
  color: "yellow"
