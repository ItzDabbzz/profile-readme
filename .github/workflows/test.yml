name: Test Action

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install act system dependencies
        if: ${{ env.ACT == 'true' }}
        run: |
          apt-get update
          apt-get install -y unzip

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  smoke-action:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Run Profile Readme entrypoint under act
        if: ${{ env.ACT == 'true' }}
        run: node dist/index.js
        env:
          INPUT_FEED: ./example/FEEDS.json
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_README: ./example/README.md
          INPUT_TEMPLATE: ./example/TEMPLATE.md
          INPUT_USERNAME: ItzDabbzz
          INPUT_WAKATIME_KEY: ${{ secrets.WAKATIME_KEY }}

      - name: Run Profile Readme action
        if: ${{ env.ACT != 'true' }}
        uses: ./
        with:
          feed: "./example/FEEDS.json"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          readme: "./example/README.md"
          template: "./example/TEMPLATE.md"
          username: "ItzDabbzz"
          wakatime_key: ${{ secrets.WAKATIME_KEY }}
